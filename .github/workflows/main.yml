name: Gunluk Haber Botu

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kodları Çek
      uses: actions/checkout@v4  # v3'ten v4'e güncellendi

    - name: Python Ortamını Kur
      uses: actions/setup-python@v5  # v4'ten v5'e güncellendi
      with:
        python-version: '3.10'

    - name: Gerekli Kütüphaneleri Yükle
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Python Scriptini Çalıştır
      env:
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        ALICI_EMAILLER: ${{ secrets.ALICI_EMAILLER }}
      run: python haber_botu.py
