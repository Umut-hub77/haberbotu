name: Gunluk Haber Botu

on:
  schedule:
    # Türkiye (UTC+3) saatine göre her sabah 08:00'de çalışır
    - cron: '0 5 * * *'
  workflow_dispatch: # Test için manuel çalıştırma butonu ekler

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kodları Çek
      uses: actions/checkout@v3

    - name: Python Ortamını Kur
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Gerekli Kütüphaneleri Yükle
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Python Scriptini Çalıştır
      env:
        GMAIL_USER: ${{ secrets.GMAIL_USER }}
        GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        ALICI_EMAILLER: ${{ secrets.ALICI_EMAILLER }}
      run: python haber_botu.py
